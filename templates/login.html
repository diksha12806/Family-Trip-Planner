{% extends 'base.html' %}
{% block title %}Login - Family Trip Planner{% endblock %}
{% block content %}
<section class="auth container" style="padding:48px 0;">
  <div class="glass" style="max-width:560px;margin:0 auto;">
    <h2>Welcome back</h2>
    <p class="text-muted">Sign in to manage your trips and family plans.</p>
    <form method="post" action="/login" style="margin-top:18px;">
      <label>Email <input type="email" name="email" required></label>
      <label>Password <input type="password" name="password" required></label>
      <div style="display:flex;gap:12px;align-items:center;margin-top:12px;">
        <button class="btn" type="submit">Login</button>
        <a href="/register" class="text-muted">Create account</a>
      </div>
    </form>
    <hr style="margin:20px 0">
    <p class="text-muted" style="font-size:0.9rem">For demo admin access use username <strong>admin</strong> and password <strong>admin123</strong>.</p>
  </div>
</section>
{% endblock %}
